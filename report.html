  <!-- 主内容 -->
  <main>
    <div class="page-section">
      <h1 class="page-title">财务报表</h1>
      <p class="page-subtitle">月度/年度收支汇总，财务状况一目了然</p>

      <!-- 优化8: 每日理财小贴士 -->

      <!-- 月份选择器 -->
      <div style="display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center;">
        <button class="btn btn--sm" style="border: 1px solid var(--color-border);" onclick="changeMonth(-1)">

        </button>
        <span style="font-size: 1.2rem; font-weight: 700; min-width: 120px; text-align: center;" id="report-month-label">2026年5月</span>
        <button class="btn btn--sm" style="border: 1px solid var(--color-border);" onclick="changeMonth(1)">
          下月 <i class="fa fa-chevron-right"></i>
        </button>
      </div>

      <!-- 汇总卡片 -->
      <div class="report-cards">
        <div class="report-card">
          <div class="report-card__value report-card__value--income" id="report-income">¥0.00</div>
          <div class="report-card__label">💰 收入合计</div>
        </div>
        <div class="report-card">
          <div class="report-card__value report-card__value--expense" id="report-expense">¥0.00</div>
          <div class="report-card__label">💸 支出合计</div>
        </div>
        <div class="report-card">
          <div class="report-card__value report-card__value--net" id="report-net">¥0.00</div>
          <div class="report-card__label">📊 净额（收入-支出）</div>
        </div>
      </div>

      <!-- 月度趋势图 -->
      <div class="chart-container">
        <h3 class="chart-container__title">📈 月度收支趋势（年度汇总）</h3>
        <div id="report-chart" class="report-chart-box"></div>
      </div>

      <!-- 月度明细表 -->
      <div class="chart-container">
        <h3 class="chart-container__title">📋 月度收支明细</h3>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>日期</th>
                <th>类型</th>
                <th>分类</th>
                <th>金额</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody id="report-table-body">
              <!-- 由 JS 动态生成 -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- 导出按钮 -->
      <div style="text-align: center; margin-top: 24px;">
        <button class="btn btn--primary" onclick="exportReport()">
          <i class="fa fa-download"></i> 导出为文本
        </button>
        <button class="btn" style="margin-left: 12px; border: 2px solid var(--color-primary); color: var(--color-primary);" onclick="window.print()">
          <i class="fa fa-print"></i> 打印报表
        </button>
      </div>
    </div>

  <!-- ECharts CDN -->
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 优化8: 报表页小贴士
    document.addEventListener('DOMContentLoaded', function() {
      showDailyTip('#daily-tip-report');
    });
  </script>
  <script>
    // ===== 月份导航 =====
    var reportYear = new Date().getFullYear();
    var reportMonth = new Date().getMonth() + 1; // 1-12

    function changeMonth(delta) {
      reportMonth += delta;
      if (reportMonth > 12) { reportMonth = 1; reportYear++; }
      if (reportMonth < 1) { reportMonth = 12; reportYear--; }
      renderReport();
    }

    function getReportMonthStr() {
      return reportYear.toString() + '-' + String(reportMonth).padStart(2, '0');
    }

    function getReportYearStr() {
      return reportYear.toString();
    }

    // ===== 初始化报表页 =====
    clearTimeout(window.__echartsLoadTimeout);
async function initReportPage() {
      await initDefaultRecords();
      renderReport();
    }

    // ===== 渲染报表 =====
    function renderReport() {
      var monthStr = getReportMonthStr();
      document.getElementById('report-month-label').textContent = reportYear + '年' + reportMonth + '月';

      var records = getRecords();
      var monthRecords = records.filter(function (r) { return r.date.startsWith(monthStr); });

      // 汇总计算
      var totalIncome = monthRecords.filter(function (r) { return r.type === 'income'; })
        .reduce(function (s, r) { return s + r.amount; }, 0);
      var totalExpense = monthRecords.filter(function (r) { return r.type === 'expense'; })
        .reduce(function (s, r) { return s + r.amount; }, 0);
      var net = totalIncome - totalExpense;

      // 优化4: 数字滚动动画
      animateNumber(document.getElementById('report-income'), totalIncome, 600);
      animateNumber(document.getElementById('report-expense'), totalExpense, 600);
      var netEl = document.getElementById('report-net');
      animateNumber(netEl, Math.abs(net), 800);
      setTimeout(function() {
        netEl.textContent = (net >= 0 ? '+' : '') + '¥' + net.toFixed(2);
      }, 810);

      // 渲染明细表
      renderReportTable(monthRecords);

      // 渲染年度趋势图
      renderReportChart(records);
    }

    // ===== 渲染明细表 =====
    function renderReportTable(records) {
      var tbody = document.getElementById('report-table-body');
      if (records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--color-text-secondary); padding: 24px;">该月暂无记录</td></tr>';
        return;
      }

      tbody.innerHTML = records.sort(function (a, b) { return b.date.localeCompare(a.date); }).map(function (r) {
        var sign = r.type === 'income' ? '+' : '-';
        var amtColor = r.type === 'income' ? 'color: var(--color-secondary);' : 'color: var(--color-warning);';
        var typeText = r.type === 'income' ? '💰 收入' : '💸 支出';
        return '<tr>' +
          '<td>' + r.date + '</td>' +
          '<td>' + typeText + '</td>' +
          '<td>' + getCategoryIcon(r.category) + ' ' + r.category + '</td>' +
          '<td style="font-weight: 700; ' + amtColor + '">' + sign + '¥' + r.amount.toFixed(2) + '</td>' +
          '<td style="color: var(--color-text-secondary);">' + (r.note || '-') + '</td>' +
          '</tr>';
      }).join('');
    }

    // ===== 渲染年度趋势图 =====
    function renderReportChart(records) {
      var dom = document.getElementById('report-chart');
      if (!dom) return;
      // 销毁已有实例
      var existing = echarts.getInstanceByDom(dom);
      if (existing) existing.dispose();

      var chart = echarts.init(dom);
      var monthly = getMonthlySummary(records);
      var yearStr = getReportYearStr();
      var months = [];
      var incomeData = [];
      var expenseData = [];

      for (var i = 1; i <= 12; i++) {
        var key = yearStr + '-' + String(i).padStart(2, '0');
        months.push(i + '月');
        if (monthly[key]) {
          incomeData.push(monthly[key].income);
          expenseData.push(monthly[key].expense);
        } else {
          incomeData.push(0);
          expenseData.push(0);
        }
      }

      var option = {
        tooltip: {
          trigger: 'axis',
          formatter: function (params) {
            var res = yearStr + '年' + params[0].axisValue + '<br/>';
            params.forEach(function (p) {
              res += p.marker + ' ' + p.seriesName + ': ¥' + p.value.toFixed(2) + '<br/>';
            });
            return res;
          }
        },
        legend: {
          data: ['收入', '支出'],
          top: 4
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '3%',
          top: '14%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          data: months
        },
        yAxis: {
          type: 'value',
          axisLabel: { formatter: '¥{value}' }
        },
        series: [
          {
            name: '收入',
            type: 'bar',
            data: incomeData,
            itemStyle: {
              color: '#34a853',
              borderRadius: [4, 4, 0, 0]
            },
            barWidth: '35%'
          },
          {
            name: '支出',
            type: 'bar',
            data: expenseData,
            itemStyle: {
              color: '#ea4335',
              borderRadius: [4, 4, 0, 0]
            },
            barWidth: '35%'
          }
        ]
      };

      chart.setOption(option);
      window.addEventListener('resize', function () { chart.resize(); });
    }

    // ===== 导出报表 =====
    function exportReport() {
      var monthStr = getReportMonthStr();
      var records = getRecords().filter(function (r) { return r.date.startsWith(monthStr); });
      var totalIncome = records.filter(function (r) { return r.type === 'income'; }).reduce(function (s, r) { return s + r.amount; }, 0);
      var totalExpense = records.filter(function (r) { return r.type === 'expense'; }).reduce(function (s, r) { return s + r.amount; }, 0);

      var text = '智财通 · 财务报表\n';
      text += reportYear + '年' + reportMonth + '月\n';
      text += '='.repeat(40) + '\n\n';
      text += '收入合计：¥' + totalIncome.toFixed(2) + '\n';
      text += '支出合计：¥' + totalExpense.toFixed(2) + '\n';
      text += '净额：¥' + (totalIncome - totalExpense).toFixed(2) + '\n\n';
      text += '-'.repeat(40) + '\n';
      text += '日期\t\t类型\t分类\t金额\t备注\n';
      text += '-'.repeat(40) + '\n';

      records.sort(function (a, b) { return b.date.localeCompare(a.date); }).forEach(function (r) {
        var sign = r.type === 'income' ? '+' : '-';
        var typeText = r.type === 'income' ? '收入' : '支出';
        text += r.date + '\t' + typeText + '\t' + r.category + '\t' + sign + '¥' + r.amount.toFixed(2) + '\t' + (r.note || '-') + '\n';
      });

      text += '\n报告由智财通自动生成 | © 2026 智财通';

      var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = '智财通报表_' + monthStr + '.txt';
      a.click();
      URL.revokeObjectURL(url);
      showToast('报表已导出！');
    }

    document.addEventListener('DOMContentLoaded', initReportPage);
  </script>

  <!-- 注册 Service Worker -->
